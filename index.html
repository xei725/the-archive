<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="The Archive，一座连接作品、收藏与记录的私人数字空间。"
    />
    <meta name="theme-color" content="#191810" />
    <title>The Archive</title>
    <link rel="preload" as="image" href="assets/images/archive-hall-room.png" />
    <link rel="stylesheet" href="styles.css" />
    <script src="weather-provider.js" defer></script>
    <script src="environment.js" defer></script>
    <script src="audio-system.js" defer></script>
    <script src="script.js" defer></script>
  </head>
  <body
    data-period="day"
    data-solar="day"
    data-weather="unavailable"
    data-weather-intensity="none"
    data-weather-effects="on"
    data-weather-status="location-required"
  >
    <a class="skip-link" href="#room-navigation">跳到房间入口</a>

    <main class="archive-hall" id="archive-hall">
      <div class="scene" aria-hidden="true">
        <img
          class="scene__image"
          src="assets/images/archive-hall-room.png"
          alt=""
          width="1680"
          height="945"
        />
        <div class="scene__vignette"></div>
        <div class="scene__grain"></div>
        <div class="scene__environment">
          <div class="scene__sunlight"></div>
          <div class="scene__weather-filter"></div>
          <div class="scene__rain scene__rain--far"></div>
          <div class="scene__rain scene__rain--near"></div>
          <div class="scene__snow"></div>
          <div class="scene__lightning"></div>
        </div>
      </div>

      <header class="hall-header">
        <h1 class="wordmark">THE ARCHIVE</h1>

        <section class="environment" aria-label="本地时间与天气">
          <div class="environment__time">
            <span class="environment__label">LOCAL TIME</span>
            <time id="local-time" datetime="">--:--</time>
            <span class="environment__meta" id="local-date">-- --- ----</span>
          </div>
          <div class="environment__weather">
            <span class="environment__label">WEATHER</span>
            <span class="environment__value" id="weather-value">LOCATION REQUIRED</span>
            <span class="environment__meta" id="weather-location" hidden></span>
            <div class="environment__weather-actions">
              <button
                class="environment__location-button"
                id="location-button"
                type="button"
                aria-label="Use your location for live weather"
              >
                USE MY LOCATION
              </button>
              <button
                class="environment__effects-button"
                id="weather-effects-toggle"
                type="button"
                aria-label="Turn off visual weather effects"
                aria-pressed="true"
              >
                FX ON
              </button>
            </div>
          </div>
          <div class="environment__visitor" aria-label="Visitor memory">
            <span class="environment__label">VISITOR MEMORY</span>
            <span class="environment__value" id="visitor-id">VISITOR ----</span>
            <span class="environment__meta" id="visitor-memory">ACCESS UNKNOWN</span>
          </div>
        </section>
      </header>

      <div class="weather-foreground" aria-hidden="true">
        <div class="weather-foreground__rain">
          <i style="--x: 1.5%; --delay: -2.1s; --duration: 8.4s; --length: 5.4rem"></i>
          <i style="--x: 5.2%; --delay: -5.7s; --duration: 10.2s; --length: 3.8rem"></i>
          <i style="--x: 9.4%; --delay: -1.2s; --duration: 11.8s; --length: 4.7rem"></i>
          <i style="--x: 14.2%; --delay: -7.4s; --duration: 13.1s; --length: 3.2rem"></i>
          <i style="--x: 85.8%; --delay: -4.8s; --duration: 12.4s; --length: 4.2rem"></i>
          <i style="--x: 90.6%; --delay: -8.9s; --duration: 14.1s; --length: 3.5rem"></i>
          <i style="--x: 95.1%; --delay: -3.4s; --duration: 9.7s; --length: 5rem"></i>
          <i style="--x: 98.3%; --delay: -6.2s; --duration: 11.1s; --length: 3.1rem"></i>
        </div>
        <div class="weather-foreground__snow">
          <i style="--x: 4%; --drift: 2.8rem; --delay: -7s; --duration: 17s; --size: 3px"></i>
          <i style="--x: 12%; --drift: -2rem; --delay: -13s; --duration: 22s; --size: 2px"></i>
          <i style="--x: 20%; --drift: 3.4rem; --delay: -3s; --duration: 20s; --size: 4px"></i>
          <i style="--x: 29%; --drift: -2.6rem; --delay: -17s; --duration: 25s; --size: 2px"></i>
          <i style="--x: 38%; --drift: 2.2rem; --delay: -10s; --duration: 19s; --size: 3px"></i>
          <i style="--x: 46%; --drift: -3.1rem; --delay: -4s; --duration: 24s; --size: 2px"></i>
          <i style="--x: 55%; --drift: 3.7rem; --delay: -15s; --duration: 21s; --size: 4px"></i>
          <i style="--x: 63%; --drift: -2.4rem; --delay: -8s; --duration: 18s; --size: 3px"></i>
          <i style="--x: 71%; --drift: 2.9rem; --delay: -19s; --duration: 26s; --size: 2px"></i>
          <i style="--x: 79%; --drift: -3.5rem; --delay: -5s; --duration: 23s; --size: 4px"></i>
          <i style="--x: 88%; --drift: 2.1rem; --delay: -12s; --duration: 20s; --size: 3px"></i>
          <i style="--x: 96%; --drift: -2.8rem; --delay: -2s; --duration: 24s; --size: 2px"></i>
        </div>
        <div class="weather-foreground__fog"></div>
        <div class="weather-foreground__flash"></div>
      </div>

      <nav class="room-map" id="room-navigation" aria-label="Archive Hall 房间入口">
        <a
          class="room-entry room-entry--library"
          href="library.html"
          data-room="library"
          data-focus-x="8%"
          data-focus-y="48%"
          aria-label="进入 Library"
        >
          <span class="room-entry__label">LIBRARY</span>
          <span class="room-entry__hint">OPEN</span>
        </a>

        <a
          class="room-entry room-entry--gallery"
          href="gallery.html"
          data-room="gallery"
          data-focus-x="28%"
          data-focus-y="42%"
          aria-label="进入 Gallery"
        >
          <span class="room-entry__label">GALLERY</span>
          <span class="room-entry__hint">OPEN</span>
        </a>

        <button
          class="room-entry room-entry--journal"
          type="button"
          data-room="journal"
          data-focus-x="68%"
          data-focus-y="42%"
          aria-label="Journal 正在准备中"
        >
          <span class="room-entry__label">JOURNAL</span>
          <span class="room-entry__hint">IN PREPARATION</span>
        </button>

        <button
          class="room-entry room-entry--studio"
          type="button"
          data-room="studio"
          data-focus-x="92%"
          data-focus-y="48%"
          aria-label="Studio 正在准备中"
        >
          <span class="room-entry__label">STUDIO</span>
          <span class="room-entry__hint">IN PREPARATION</span>
        </button>
      </nav>

      <nav class="room-menu" aria-label="Archive Hall 房间列表">
        <a href="library.html" data-room="library">
          <span>LIBRARY</span>
          <small>OPEN</small>
        </a>
        <a href="gallery.html" data-room="gallery">
          <span>GALLERY</span>
          <small>OPEN</small>
        </a>
        <button type="button" data-room="studio">
          <span>STUDIO</span>
          <small>IN PREPARATION</small>
        </button>
        <button type="button" data-room="journal">
          <span>JOURNAL</span>
          <small>IN PREPARATION</small>
        </button>
      </nav>

      <footer class="hall-footer">
        <button
          class="sound-toggle"
          id="sound-toggle"
          type="button"
          aria-pressed="false"
          aria-label="开启大厅环境声"
        >
          <span id="sound-label">SOUND OFF</span>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 10v4M8 8v8M12 5v14M16 8v8M20 10v4" />
          </svg>
        </button>
        <p class="hall-status" id="hall-status" role="status" aria-live="polite"></p>
      </footer>

      <div class="transition-curtain" aria-hidden="true"></div>
    </main>
  </body>
</html>
